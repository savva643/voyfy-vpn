<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>VoyFy – Sign in</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <!-- Desktop Header -->
      <header class="topbar desktop-only">
        <div class="topbar-inner">
          <a class="brand" href="./index.html">
            <img src="./logo.png" alt="VoyFy" class="brand-logo">
            <span class="brand-name">VoyFy</span>
          </a>
          <nav class="topnav">
            <a class="nav-link" href="./index.html">Home</a>
            <a class="nav-link" href="./subscriptions.html">Subscriptions</a>
            <a class="nav-link" href="./updates.html">Updates</a>
            <a class="nav-link auth-tab-link active" href="./auth.html" id="desktop-auth-link">Sign in</a>
            <button class="theme-toggle" id="desktop-theme-toggle" aria-label="Toggle theme">
              <i class="fas fa-sun"></i>
            </button>
          </nav>
        </div>
      </header>

      <!-- Toast Container -->
      <div id="toast-container"></div>

      <main class="content">
        <section class="section auth-section">
          <h1 class="hero-title" style="font-size: 38px;">Account</h1>
          <p class="hero-subtitle">Sign in or create a new account</p>

          <div class="auth-tabs">
            <button class="auth-tab active" type="button" data-tab="login">Sign in</button>
            <button class="auth-tab" type="button" data-tab="register">Create account</button>
          </div>

          <div class="auth-panels">
            <div id="auth-login" class="auth-panel active">
              <form class="card auth-card" id="login-form">
                <div class="card-title">Welcome back</div>
                <div class="muted" style="margin-bottom: 16px;">Enter your credentials to sign in</div>
                <label class="field">
                  <span>Email</span>
                  <input id="login-email" type="email" autocomplete="email" required />
                </label>
                <label class="field">
                  <span>Password</span>
                  <div class="password-input-wrapper">
                    <input id="login-password" type="password" autocomplete="current-password" required />
                    <button type="button" class="password-toggle" data-target="login-password">
                      <i class="fas fa-eye"></i>
                    </button>
                  </div>
                </label>
                <button class="btn btn-primary" type="submit">Sign in</button>
                <div class="form-message" id="login-message"></div>
              </form>
            </div>

            <div id="auth-register" class="auth-panel">
              <form class="card auth-card" id="register-form">
                <div class="card-title">Create account</div>
                <div class="muted" style="margin-bottom: 16px;">Fill in your details to register</div>
                <label class="field">
                  <span>Email</span>
                  <input id="reg-email" type="email" required />
                </label>
                <label class="field">
                  <span>Password</span>
                  <div class="password-input-wrapper">
                    <input id="reg-password" type="password" required />
                    <button type="button" class="password-toggle" data-target="reg-password">
                      <i class="fas fa-eye"></i>
                    </button>
                  </div>
                </label>
                <button class="btn btn-primary" type="submit">Create account</button>
                <div class="form-message" id="reg-message"></div>
              </form>
            </div>
          </div>

        </section>
      </main>

    <script>
      (function() {
        // Check if already logged in - redirect to profile
        const token = localStorage.getItem('voyfy_token');
        if (token) {
          window.location.href = './profile.html';
          return;
        }

        // Tab switching
        const tabs = document.querySelectorAll('.auth-tab');
        const panels = {
          login: document.getElementById('auth-login'),
          register: document.getElementById('auth-register')
        };

        tabs.forEach(tab => {
          tab.addEventListener('click', () => {
            const name = tab.dataset.tab;
            tabs.forEach(t => t.classList.toggle('active', t === tab));
            Object.values(panels).forEach(p => p.classList.remove('active'));
            if (panels[name]) panels[name].classList.add('active');
          });
        });

        // Password toggle
        document.querySelectorAll('.password-toggle').forEach(btn => {
          btn.addEventListener('click', () => {
            const targetId = btn.dataset.target;
            const input = document.getElementById(targetId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
              input.type = 'text';
              icon.classList.remove('fa-eye');
              icon.classList.add('fa-eye-slash');
            } else {
              input.type = 'password';
              icon.classList.remove('fa-eye-slash');
              icon.classList.add('fa-eye');
            }
          });
        });

        // Update year
        const yearEl = document.getElementById('year');
        if (yearEl) yearEl.textContent = new Date().getFullYear();
      })();
    </script>

      <!-- Mobile Bottom Navigation -->
      <nav class="mobile-bottom-nav mobile-only">
        <a href="./index.html" class="bottom-nav-item">
          <i class="fas fa-home"></i>
          <span>Home</span>
        </a>
        <a href="./subscriptions.html" class="bottom-nav-item">
          <i class="fas fa-crown"></i>
          <span>Premium</span>
        </a>
        <a href="./updates.html" class="bottom-nav-item">
          <i class="fas fa-bell"></i>
          <span>Updates</span>
        </a>
        <a href="./auth.html" class="bottom-nav-item active" id="mobile-auth-link">
          <i class="fas fa-user"></i>
          <span id="mobile-auth-text">Sign in</span>
        </a>
      </nav>

      <footer class="footer desktop-only">
        <div class="footer-inner">
          <span>© <span id="year"></span> VoyFy VPN</span>
          <a href="mailto:support@voyfy.vpn">support@voyfy.vpn</a>
        </div>
      </footer>
    </div>

    <script src="./os-detect.js"></script>
  </body>
</html>
