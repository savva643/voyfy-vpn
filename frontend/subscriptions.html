<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>VoyFy VPN - Subscriptions</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <!-- Toast Container -->
      <div id="toast-container"></div>

      <!-- Mobile Header -->
      <header class="mobile-header mobile-only">
        <a class="brand" href="./index.html">
          <img src="./logo.png" alt="VoyFy" class="brand-logo">
          <span class="brand-name">VoyFy</span>
        </a>
        <button class="theme-toggle" id="mobile-theme-toggle" aria-label="Toggle theme">
          <i class="fas fa-sun"></i>
        </button>
      </header>

      <!-- Desktop Header -->
      <header class="topbar desktop-only">
        <div class="topbar-inner">
          <a class="brand" href="./index.html">
            <img src="./logo.png" alt="VoyFy" class="brand-logo">
            <span class="brand-name">VoyFy</span>
          </a>
          <nav class="topnav">
            <a class="nav-link" href="./index.html">Home</a>
            <a class="nav-link active" href="./subscriptions.html">Subscriptions</a>
            <a class="nav-link" href="./updates.html">Updates</a>
            <a class="nav-link auth-tab-link" href="./auth.html" id="desktop-auth-link">Sign in</a>
            <button class="theme-toggle" id="desktop-theme-toggle" aria-label="Toggle theme">
              <i class="fas fa-sun"></i>
            </button>
          </nav>
        </div>
      </header>

      <main class="content">
        <section id="premium" class="section">
          <h2 class="section-title">Premium</h2>
          <p class="section-subtitle">Unlock all servers and maximum speed</p>
          <div class="currency-selector">
            <select id="currency-select">
              <option value="usd">USD ($)</option>
              <option value="rub">RUB (₽)</option>
              <option value="eur">EUR (€)</option>
            </select>
          </div>
          <div class="plans" id="plans-container">
            <div class="plan">Loading...</div>
          </div>
        </section>

      </main>

      <!-- Mobile Bottom Navigation -->
      <nav class="mobile-bottom-nav mobile-only">
        <a href="./index.html" class="bottom-nav-item">
          <i class="fas fa-home"></i>
          <span>Home</span>
        </a>
        <a href="./subscriptions.html" class="bottom-nav-item active">
          <i class="fas fa-crown"></i>
          <span>Premium</span>
        </a>
        <a href="./updates.html" class="bottom-nav-item">
          <i class="fas fa-bell"></i>
          <span>Updates</span>
        </a>
        <a href="./auth.html" class="bottom-nav-item" id="mobile-auth-link">
          <i class="fas fa-user"></i>
          <span id="mobile-auth-text">Sign in</span>
        </a>
      </nav>

      <footer class="footer desktop-only">
        <div class="footer-inner">
          <span>© <span id="year"></span> VoyFy VPN</span>
          <a href="mailto:support@voyfy.vpn">support@voyfy.vpn</a>
        </div>
      </footer>
    </div>

    <script src="./os-detect.js"></script>
    <script>
      // Subscription plans loading
      let currentCurrency = 'usd';
      let plans = [];

      const currencySymbols = {
        usd: '$',
        rub: '₽',
        eur: '€'
      };

      async function loadPlans() {
        try {
          const response = await fetch('http://localhost:4000/api/subscriptions/plans');
          const data = await response.json();

          if (data.success) {
            plans = data.plans;
            renderPlans();
          } else {
            document.getElementById('plans-container').innerHTML = '<div class="plan">Failed to load plans</div>';
          }
        } catch (error) {
          console.error('Error loading plans:', error);
          document.getElementById('plans-container').innerHTML = '<div class="plan">Error loading plans</div>';
        }
      }

      function renderPlans() {
        const container = document.getElementById('plans-container');
        const symbol = currencySymbols[currentCurrency];

        container.innerHTML = plans.map(plan => {
          const price = plan[`price_${currentCurrency}`];
          const period = plan.duration_days === 30 ? '/month' : plan.duration_days === 90 ? '/3 months' : plan.duration_days === 365 ? '/year' : '';
          const features = Array.isArray(plan.features) ? plan.features : JSON.parse(plan.features || '[]');

          return `
            <div class="plan ${plan.is_popular ? 'plan-popular' : ''}">
              ${plan.is_popular ? '<div class="plan-badge">POPULAR</div>' : ''}
              <div class="plan-head">
                <div class="plan-name">${plan.name}</div>
                <div class="plan-price"><span class="price">${symbol}${price.toFixed(2)}</span><span class="period">${period}</span></div>
              </div>
              <ul class="plan-list">
                ${features.map(f => `<li>${f}</li>`).join('')}
              </ul>
              <button class="btn btn-primary" type="button" onclick="selectPlan('${plan.id}')">Buy</button>
            </div>
          `;
        }).join('');
      }

      function selectPlan(planId) {
        const token = localStorage.getItem('voyfy_token');
        if (!token) {
          window.location.href = './auth.html';
          return;
        }

        // TODO: Implement payment flow
        alert(`Plan selected: ${planId}. Payment integration coming soon.`);
      }

      document.addEventListener('DOMContentLoaded', function() {
        const yearEl = document.getElementById('year');
        if (yearEl) yearEl.textContent = new Date().getFullYear();

        // Load subscription plans
        loadPlans();

        // Currency selector
        const currencySelect = document.getElementById('currency-select');
        if (currencySelect) {
          currencySelect.addEventListener('change', (e) => {
            currentCurrency = e.target.value;
            renderPlans();
          });
        }

        // Check auth state with a small delay to ensure os-detect.js is loaded
        setTimeout(function() {
          if (typeof checkAuthState === 'function') {
            checkAuthState();
          } else {
            // Fallback: manually check token and update UI
            const token = localStorage.getItem('voyfy_token');
            if (token) {
              const desktopAuthLink = document.getElementById('desktop-auth-link');
              const mobileAuthLink = document.getElementById('mobile-auth-link');
              const mobileAuthText = document.getElementById('mobile-auth-text');

              if (desktopAuthLink) {
                desktopAuthLink.href = './profile.html';
                desktopAuthLink.classList.add('profile-link');
                desktopAuthLink.classList.remove('auth-tab-link');
                desktopAuthLink.innerHTML = '<i class="fas fa-user"></i> Profile';
              }
              if (mobileAuthLink) {
                mobileAuthLink.href = './profile.html';
                mobileAuthLink.classList.add('profile-link');
              }
              if (mobileAuthText) {
                mobileAuthText.textContent = 'Profile';
              }
            }
          }
        }, 100);
      });
    </script>
  </body>
</html>
